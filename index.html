<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager | Login</title>
    <link rel="stylesheet" href="/src/styles/style.css" />
  </head>
  <body>
    <header>
      <h1>TaskManager</h1>
    </header>
    <main>
      <div>
        <button id="loginTab">Login</button>
        <button id="registerTab">Register</button>
      </div>

      <form id="loginForm">
        <h2>Login</h2>

        <label for="loginEmail">Email</label>
        <input
          type="email"
          id="loginEmail"
          placeholder="Enter your email"
          required
        />
        <span id="loginEmailError" class="error"></span>

        <label for="loginPassword">Password</label>

        <input
          type="password"
          id="loginPassword"
          placeholder="Enter your password"
          required
        />
        <span id="loginPasswordError" class="error"></span>
        <button type="submit">Login</button>
      </form>

      <form>
        <h2>Register</h2>

        <label for="regUsername">Username</label>
        <input
          type="text"
          id="regUsername"
          placeholder="Enter your username"
          required
        />
        <span id="regUsernameError" class="error"></span>

        <label for="regEmail">Email</label>
        <input
          type="email"
          id="regEmail"
          placeholder="Enter your email"
          required
        />
        <span id="regEmailError" class="error"></span>

        <label for="regPassword">Password</label>
        <input
          type="password"
          id="regPassword"
          placeholder="Create your password"
          required
        />
        <span id="regPasswordError" class="error"></span>

        <label for="regConfirmPassword">Confirm Password</label>
        <input
          type="password"
          id="regConfirmPassword"
          placeholder="Confirm your password"
          required
        />
        <span id="regConfirmPasswordError" class="error"></span>
        <button type="submit">Create Account</button>
      </form>
    </main>
    <script type="module" src="/src/scripts/main.ts"></script>
  </body>
</html>
